apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-5xx-ratio
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: api-5xx-ratio
      rules:
        - record: api:http_5xx_ratio_5m
          expr: |
            (
              sum(rate(flask_http_request_total{namespace="demo",service="api",status=~"5.."}[5m])) or vector(0)
            )
            /
            clamp_min(
              (sum(rate(flask_http_request_total{namespace="demo",service="api"}[5m])) or vector(0)),
              1
            )
