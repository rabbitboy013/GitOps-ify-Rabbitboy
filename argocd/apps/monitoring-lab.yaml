apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rabbitboy013/GitOps-ify-Rabbitboy.git
    targetRevision: main
    path: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
