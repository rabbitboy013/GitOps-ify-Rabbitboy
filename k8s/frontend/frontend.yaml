apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-content
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  default.conf: |
    server {
      listen 80;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      location /api/ {
        proxy_pass http://backend:5678/;
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>GitOps Frontend</title>
      </head>
      <body>
        <h1>GitOps Frontend</h1>
        <p id="result">Loading backend...</p>
        <script>
          fetch("/api/")
            .then((response) => response.json())
            .then((data) => {
              document.getElementById("result").textContent = data.message;
            })
            .catch(() => {
              document.getElementById("result").textContent = "Backend unavailable";
            });
        </script>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: content
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
      volumes:
        - name: content
          configMap:
            name: frontend-content
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
